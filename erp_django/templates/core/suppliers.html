{% extends "core/base.html" %}

{% block title %}ERP Core - Suppliers{% endblock %}
{% block page_title %}Supplier Management{% endblock %}

{% block main_content %}
<div class="bg-white rounded-xl border border-slate-200 p-6 mb-6">
    <h3 class="text-lg font-bold text-slate-700 mb-4">Add New Supplier</h3>
    <form id="supplier-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Name *</label>
            <input type="text" id="sup-name" required class="w-full rounded-lg border border-slate-200 p-2">
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Contact Person</label>
            <input type="text" id="sup-contact" class="w-full rounded-lg border border-slate-200 p-2">
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Email</label>
            <input type="email" id="sup-email" class="w-full rounded-lg border border-slate-200 p-2">
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Phone</label>
            <input type="text" id="sup-phone" class="w-full rounded-lg border border-slate-200 p-2">
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Category</label>
            <input type="text" id="sup-category" class="w-full rounded-lg border border-slate-200 p-2" placeholder="e.g. IMPORTS, LOCAL">
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Rating (1-5)</label>
            <input type="number" id="sup-rating" min="1" max="5" class="w-full rounded-lg border border-slate-200 p-2">
        </div>
        <div class="md:col-span-3">
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Address</label>
            <textarea id="sup-address" rows="2" class="w-full rounded-lg border border-slate-200 p-2"></textarea>
        </div>
        <div class="md:col-span-3">
            <button type="submit" class="px-6 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700">
                <i class="fas fa-plus mr-2"></i>Add Supplier
            </button>
        </div>
    </form>
</div>

<div class="bg-white rounded-xl border border-slate-200 p-6">
    <h3 class="text-lg font-bold text-slate-700 mb-4">Suppliers</h3>
    <div id="suppliers-list">
        <p class="text-slate-400 text-center">Loading...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
{% csrf_token %}
<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
const csrfToken = getCookie('csrfmiddlewaretoken');

async function loadSuppliers() {
    const res = await fetch('/api/suppliers/');
    const data = await res.json();
    
    if (!data.length) {
        document.getElementById('suppliers-list').innerHTML = '<p class="text-slate-400 text-center">No suppliers found</p>';
        return;
    }
    
    document.getElementById('suppliers-list').innerHTML = `
        <table class="w-full text-sm">
            <thead class="bg-slate-50 text-xs">
                <tr>
                    <th class="px-4 py-2 text-left">Name</th>
                    <th class="px-4 py-2 text-left">Contact</th>
                    <th class="px-4 py-2 text-left">Email</th>
                    <th class="px-4 py-2 text-left">Category</th>
                    <th class="px-4 py-2 text-center">Rating</th>
                    <th class="px-4 py-2 text-center">Linked Items</th>
                    <th class="px-4 py-2 text-right">Actions</th>
                </tr>
            </thead>
            <tbody>
                ${data.map(s => `
                <tr class="border-t">
                    <td class="px-4 py-2 font-bold">${s.name}</td>
                    <td class="px-4 py-2">${s.contact_name || '-'}</td>
                    <td class="px-4 py-2">${s.email || '-'}</td>
                    <td class="px-4 py-2"><span class="px-2 py-0.5 rounded bg-slate-100 text-xs">${s.category || '-'}</span></td>
                    <td class="px-4 py-2 text-center">${'<i class="fas fa-star text-amber-400"></i>'.repeat(s.rating || 0)}${'<i class="far fa-star text-slate-300"></i>'.repeat(5 - (s.rating || 0))}</td>
                    <td class="px-4 py-2 text-center font-mono">${s.linked_items_count || 0}</td>
                    <td class="px-4 py-2 text-center">
                        <button class="p-1.5 rounded hover:bg-red-100 text-red-500" onclick="deleteSupplier(${s.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

document.getElementById('supplier-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const data = {
        name: document.getElementById('sup-name').value,
        contact_name: document.getElementById('sup-contact').value,
        email: document.getElementById('sup-email').value,
        phone: document.getElementById('sup-phone').value,
        category: document.getElementById('sup-category').value,
        rating: parseInt(document.getElementById('sup-rating').value) || null
    };
    
    const res = await fetch('/api/suppliers/', {
        method: 'POST',
        headers: { 
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
        },
        body: JSON.stringify(data),
        credentials: 'include'
    });
    
    if (res.ok) {
        document.getElementById('supplier-form').reset();
        loadSuppliers();
        alert('Supplier added!');
    } else {
        alert('Error adding supplier');
    }
});

async function deleteSupplier(id) {
    if (!confirm('Delete this supplier?')) return;
    await fetch(`/api/suppliers/${id}/`, { 
        method: 'DELETE',
        headers: { 'X-CSRFToken': csrfToken },
        credentials: 'include'
    });
    loadSuppliers();
}

document.addEventListener('DOMContentLoaded', loadSuppliers);
</script>
{% endblock %}
