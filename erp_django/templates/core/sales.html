{% extends "core/base.html" %}

{% block title %}ERP Core - Sales{% endblock %}
{% block page_title %}Sales & Delivery{% endblock %}

{% block main_content %}
<div class="bg-white rounded-xl border border-slate-200 p-6 mb-6">
    <h3 class="text-lg font-bold text-slate-700 mb-4">Create Sales Order</h3>
    <form id="sales-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Order Number</label>
            <input type="text" id="order-number" required class="w-full rounded-lg border border-slate-200 p-2" placeholder="SO-001">
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Customer Name</label>
            <input type="text" id="customer-name" required class="w-full rounded-lg border border-slate-200 p-2">
        </div>
        <div>
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Contact</label>
            <input type="text" id="customer-contact" class="w-full rounded-lg border border-slate-200 p-2">
        </div>
        <div class="md:col-span-3">
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Select Finished Goods</label>
            <div id="sales-items" class="space-y-2"></div>
            <button type="button" onclick="addSalesItem()" class="mt-2 px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm hover:bg-slate-200">
                <i class="fas fa-plus mr-2"></i>Add Item
            </button>
        </div>
        <div class="md:col-span-3">
            <button type="submit" class="px-6 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700">
                <i class="fas fa-check mr-2"></i>Create Order
            </button>
        </div>
    </form>
</div>

<div class="bg-white rounded-xl border border-slate-200 p-6">
    <h3 class="text-lg font-bold text-slate-700 mb-4">Recent Orders</h3>
    <div id="orders-list">
        <p class="text-slate-400 text-center">Loading...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
{% csrf_token %}
<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
const csrfToken = getCookie('csrfmiddlewaretoken');

let salesItemCount = 0;

async function loadFinishedGoods() {
    const res = await fetch('/api/inventory/items/simple_list/');
    const data = await res.json();
    window.finishedGoods = data.filter(i => i.major_category === 'FINISHED GOODS');
}

function addSalesItem() {
    const container = document.getElementById('sales-items');
    const div = document.createElement('div');
    div.className = 'flex gap-2 items-center';
    div.id = `sales-item-${salesItemCount}`;
    div.innerHTML = `
        <select name="item" class="flex-1 rounded-lg border border-slate-200 p-2 text-sm">
            <option value="">Select Item</option>
            ${window.finishedGoods.map(i => `<option value="${i.id}">${i.sku} - ${i.name}</option>`).join('')}
        </select>
        <input type="number" name="qty" placeholder="Qty" min="1" class="w-24 rounded-lg border border-slate-200 p-2">
        <input type="number" name="price" placeholder="Price" step="0.01" class="w-32 rounded-lg border border-slate-200 p-2">
        <button type="button" onclick="this.parentElement.remove()" class="p-2 text-red-500 hover:bg-red-50 rounded"><i class="fas fa-times"></i></button>
    `;
    container.appendChild(div);
    salesItemCount++;
}

document.getElementById('sales-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const items = [];
    document.querySelectorAll('#sales-items > div').forEach(div => {
        const itemId = div.querySelector('select').value;
        const qty = parseFloat(div.querySelector('input[name="qty"]').value);
        const price = parseFloat(div.querySelector('input[name="price"]').value) || 0;
        if (itemId && qty) {
            items.push({ item_id: parseInt(itemId), quantity: qty, unit_price: price });
        }
    });
    
    if (!items.length) {
        alert('Add at least one item');
        return;
    }
    
    const data = {
        order_number: document.getElementById('order-number').value,
        customer_name: document.getElementById('customer-name').value,
        customer_contact: document.getElementById('customer-contact').value,
        items: items
    };
    
    const res = await fetch('/api/sales/orders/', {
        method: 'POST',
        headers: { 
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
        },
        body: JSON.stringify(data),
        credentials: 'include'
    });
    
    if (res.ok) {
        alert('Order created successfully!');
        loadOrders();
    } else {
        const err = await res.json();
        alert('Error: ' + (err.detail || JSON.stringify(err)));
    }
});

async function loadOrders() {
    const res = await fetch('/api/sales/orders/');
    const data = await res.json();
    
    if (!data.length) {
        document.getElementById('orders-list').innerHTML = '<p class="text-slate-400 text-center">No orders yet</p>';
        return;
    }
    
    document.getElementById('orders-list').innerHTML = `
        <table class="w-full text-sm">
            <thead class="bg-slate-50 text-xs">
                <tr>
                    <th class="px-4 py-2 text-left">Order #</th>
                    <th class="px-4 py-2 text-left">Customer</th>
                    <th class="px-4 py-2 text-left">Status</th>
                    <th class="px-4 py-2 text-right">Total</th>
                    <th class="px-4 py-2 text-left">Date</th>
                </tr>
            </thead>
            <tbody>
                ${data.slice(0, 20).map(order => `
                <tr class="border-t">
                    <td class="px-4 py-2 font-mono font-bold">${order.order_number}</td>
                    <td class="px-4 py-2">${order.customer_name}</td>
                    <td class="px-4 py-2"><span class="px-2 py-0.5 rounded text-xs font-bold ${order.status === 'pending' ? 'bg-amber-100 text-amber-700' : order.status === 'confirmed' ? 'bg-blue-100 text-blue-700' : 'bg-emerald-100 text-emerald-700'}">${order.status.toUpperCase()}</span></td>
                    <td class="px-4 py-2 text-right font-mono">৳${(order.total_amount || 0).toFixed(2)}</td>
                    <td class="px-4 py-2 text-slate-500">${new Date(order.created_at).toLocaleDateString()}</td>
                </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

document.addEventListener('DOMContentLoaded', async () => {
    await loadFinishedGoods();
    addSalesItem();
    loadOrders();
});
</script>
{% endblock %}
